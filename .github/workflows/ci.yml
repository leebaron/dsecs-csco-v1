name: DSECS Kernel CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Unit tests
        run: python -m pytest tests/ -v --tb=short

      - name: Deterministic test
        run: python experiments/deterministic_test.py

      - name: Byzantine test
        run: python experiments/byzantine_test.py

      - name: Simulation + CI gate
        run: python experiments/simulate.py --steps 100 --nodes 3

      - name: CI gate
        run: python dsecs/ci/gate.py
